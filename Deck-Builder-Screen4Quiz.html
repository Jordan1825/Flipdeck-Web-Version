<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz - FlipDeck</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>FlipDeck</h1>
        <h2 id="quiz-deck-name"></h2>

        <p id="quiz-progress">Card <span id="current-card-num">1</span> of <span id="total-cards">?</span></p>

        <div id="quiz-question-box">
            <p id="quiz-question"></p>
        </div>

        <div id="quiz-choices"></div>

        <p id="quiz-feedback" style="display:none;"></p>

        <button id="quiz-next-btn" style="display:none;">Next</button>

        <div id="quiz-results" style="display:none;">
            <p id="quiz-score-text"></p>
            <button id="quiz-home-btn">Back to Home</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
