<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review Deck - FLipDeck</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="deck-builder-header">
            <h1>FlipDeck</h1>
            <p class="review-label">Review Mode</p>
        </div>

        <!-- Deck Name Display -->
         <div class="review-deck-name">
            <h2 id="deck-name-display">Deck Name</h2>
         </div>

        <!-- Card Display Area -->
        <div id="review-cards-container">
            <!-- Cards get injected here by javascript -->
        </div>

        <!-- Action Buttons -->
        <button id="save-deck-btn">Confirm & Save Deck</button>
        <button id="save-and-quiz-btn">Save & Start Quiz</button>
        <button id="quiz-from-review-btn" style="display:none;">Take Quiz</button>
        <button id="go-back-btn">Go Back & Edit</button>

    </div>

    <script src="script.js"></script>
</body>
</html>
